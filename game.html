<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Battle Tanks - اختيار الغرفة</title>
    <style>
        /* ============================================
           🎨 الأنماط العامة
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #0a0f1a;
            color: white;
            overflow-x: hidden;
        }

        /* 🌌 الخلفية المتحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1a2e 30%, #16213e 60%, #0a0f1a 100%);
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            animation: bgMove 30s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5%, -5%) rotate(1deg); }
            66% { transform: translate(-5%, 5%) rotate(-1deg); }
        }

        /* ✨ النجوم */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ============================================
           📊 الشريط العلوي
           ============================================ */
        .header {
            position: relative;
            z-index: 1;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #d4af37;
        }

        .logo span {
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 6px 16px 6px 6px;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
        }

        .user-name {
            font-size: 14px;
            color: #fff;
        }

        .balance-display {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-display .label {
            color: #aaa;
            font-size: 12px;
        }

        .balance-display .value {
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
        }

        /* ============================================
           🏠 المحتوى الرئيسي
           ============================================ */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .page-title {
            text-align: center;
            color: #d4af37;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .page-subtitle {
            text-align: center;
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* ============================================
           🏠 بطاقات الغرف
           ============================================ */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .room-card {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .room-card:hover::before {
            opacity: 1;
        }

        .room-card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
        }

        .room-card .room-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .room-card .room-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .room-card .room-details {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .room-card .room-details span {
            color: #d4af37;
        }

        .room-card .room-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .room-card .status-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.waiting {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-badge.full {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .status-badge.active {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .room-card .players-count {
            color: #888;
            font-size: 14px;
        }

        .room-card .players-count span {
            color: #d4af37;
            font-weight: bold;
        }

        /* ============================================
           🪑 المقاعد (تظهر عند اختيار غرفة)
           ============================================ */
        .seats-section {
            display: none;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            padding: 30px;
            margin-top: 20px;
            animation: slideUp 0.5s ease-out;
        }

        .seats-section.visible {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .seats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .seats-header h3 {
            color: #d4af37;
            font-size: 24px;
        }

        .seats-header .close-seats {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .seats-header .close-seats:hover {
            background: rgba(255,255,255,0.2);
        }

        .seats-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }

        .seats-info .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .seats-info .info-item span {
            color: #fff;
            font-weight: bold;
        }

        .seats-info .info-item .highlight {
            color: #d4af37;
        }

        /* 🪑 شبكة المقاعد */
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .seat {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            font-weight: bold;
            border: 3px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #888;
            position: relative;
            min-height: 70px;
        }

        .seat .seat-number {
            font-size: 16px;
            color: #fff;
        }

        .seat .seat-status {
            font-size: 10px;
            margin-top: 4px;
        }

        /* مقعد فارغ */
        .seat.empty {
            border-color: rgba(46, 204, 113, 0.4);
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }

        .seat.empty:hover {
            transform: scale(1.08);
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.2);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
        }

        .seat.empty .seat-status {
            color: #2ecc71;
        }

        /* مقعد محجوز */
        .seat.occupied {
            border-color: rgba(231, 76, 60, 0.4);
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            cursor: not-allowed;
        }

        .seat.occupied .seat-status {
            color: #e74c3c;
        }

        .seat.occupied .player-name {
            font-size: 10px;
            color: #aaa;
            margin-top: 2px;
        }

        /* مقعد اللاعب الحالي */
        .seat.mine {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .seat.mine .seat-status {
            color: #d4af37;
        }

        /* 🔘 أزرار المقاعد */
        .seats-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            justify-content: center;
        }

        .seats-actions .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .seats-actions .btn:hover {
            transform: scale(1.05);
        }

        .btn-leave {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .btn-leave:hover {
            background: rgba(231, 76, 60, 0.3);
        }

        .btn-refresh {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-refresh:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ============================================
           🚫 شاشة الخطأ
           ============================================ */
        .error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            backdrop-filter: blur(10px);
        }

        .error-screen .icon {
            font-size: 80px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .error-screen h1 {
            color: #ff4444;
            font-size: 32px;
            text-align: center;
        }

        .error-screen p {
            color: #aaa;
            font-size: 18px;
            text-align: center;
            max-width: 400px;
            line-height: 1.8;
        }

        .error-screen .btn-telegram {
            padding: 16px 40px;
            background: #0088cc;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .error-screen .btn-telegram:hover {
            transform: scale(1.05);
        }

        /* ============================================
           ⏳ تحميل
           ============================================ */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loading-overlay .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================
           📱 استجابة
           ============================================ */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                margin: 10px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .header-left {
                justify-content: center;
            }

            .header-right {
                justify-content: center;
                flex-wrap: wrap;
            }

            .logo {
                font-size: 18px;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .seats-grid {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
                gap: 10px;
            }

            .seat {
                min-height: 60px;
            }

            .page-title {
                font-size: 24px;
            }

            .seats-section {
                padding: 20px;
            }

            .seats-header h3 {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .seats-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .seat .seat-number {
                font-size: 14px;
            }

            .seats-actions .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        /* ============================================
           🎯 رسائل الحالة
           ============================================ */
        .status-message {
            padding: 15px 20px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .status-message.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .status-message.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .status-message.info {
            display: block;
            background: rgba(241, 196, 15, 0.15);
            border: 1px solid rgba(241, 196, 15, 0.3);
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <!-- 🌌 الخلفية -->
    <div class="bg-animation"></div>
    <div class="stars" id="stars"></div>

    <!-- 🚫 شاشة الخطأ -->
    <div class="error-screen" id="errorScreen" style="display:none;">
        <div class="icon">🔒</div>
        <h1>⚠️ خطأ في المصادقة</h1>
        <p>يرجى تسجيل الدخول عبر بوت تيليغرام للحصول على معرف المستخدم.</p>
        <a href="https://t.me/BattleTanksBot" target="_blank" class="btn-telegram">📱 فتح بوت تيليغرام</a>
    </div>

    <!-- ⏳ التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- ============================================
    📱 المحتوى الرئيسي
    ============================================ -->
    <div class="container" id="mainContainer" style="display:none;">

        <!-- 📊 الشريط العلوي -->
        <header class="header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='index.html'">🏠 العودة</button>
                <div class="logo">⚔️ Battle <span>Tanks</span></div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <span class="user-name" id="userName">اللاعب</span>
                </div>
                <div class="balance-display">
                    <span class="label">💰</span>
                    <span class="value" id="userBalance">0</span>
                    <span style="color:#888;font-size:12px;">$</span>
                </div>
            </div>
        </header>

        <!-- 🏠 العنوان -->
        <h1 class="page-title">🏠 اختيار ساحة المعركة</h1>
        <p class="page-subtitle">اختر نوع المعركة التي تريد خوضها</p>

        <!-- 🏠 بطاقات الغرف -->
        <div class="rooms-grid" id="roomsGrid">
            <!-- سيتم إنشاؤها بواسطة JavaScript -->
        </div>

        <!-- رسالة الحالة -->
        <div class="status-message" id="statusMessage"></div>

        <!-- 🪑 المقاعد -->
        <div class="seats-section" id="seatsSection">
            <div class="seats-header">
                <h3 id="selectedRoomTitle">🪑 مقاعد الغرفة</h3>
                <button class="close-seats" onclick="closeSeats()">✕ إغلاق</button>
            </div>

            <div class="seats-info">
                <div class="info-item">👥 اللاعبين: <span id="seatsPlayersCount">0</span>/<span id="seatsMaxPlayers">0</span></div>
                <div class="info-item">💰 سعر المقعد: <span class="highlight" id="seatsPrice">0</span> $</div>
                <div class="info-item">⏳ يحتاج: <span id="seatsNeeded">0</span> لاعب</div>
            </div>

            <div class="seats-grid" id="seatsGrid">
                <!-- سيتم إنشاؤها بواسطة JavaScript -->
            </div>

            <div class="seats-actions">
                <button class="btn btn-leave" id="leaveRoomBtn" onclick="leaveRoom()">🚪 مغادرة الغرفة</button>
                <button class="btn btn-refresh" onclick="refreshSeats()">🔄 تحديث</button>
            </div>
        </div>

    </div>

    <!-- ============================================
    📜 JavaScript
    ============================================ -->
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        // ============================================
        // 🎯 إعدادات
        // ============================================
        const ADMIN_TELEGRAM_ID = '7011476249';
        const SERVER_URL = window.location.origin;
        let socket = null;
        let currentUser = null;
        let currentRoomId = null;
        let isInRoom = false;
        let selectedRoomId = null;

        // ============================================
        // ⭐ إنشاء النجوم
        // ============================================
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // ============================================
        // 📱 استخلاص معرف المستخدم
        // ============================================
        function getTelegramId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('user_id') || params.get('telegram_id') || null;
        }

        // ============================================
        // 🔌 اتصال Socket.io
        // ============================================
        function connectSocket(telegramId) {
            if (socket) {
                socket.disconnect();
            }

            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 10,
                reconnectionDelay: 1000
            });

            socket.on('connect', () => {
                console.log('✅ Socket connected');
                socket.emit('auth', { telegramId });
            });

            socket.on('auth_success', (data) => {
                console.log('✅ Auth success:', data);
                currentUser = data;
                document.getElementById('userName').textContent = data.username || `مستخدم ${telegramId.slice(-4)}`;
                document.getElementById('userBalance').textContent = data.balance || 0;
                document.getElementById('userAvatar').textContent = telegramId.slice(-2);
                document.getElementById('loadingOverlay').style.display = 'none';
                loadRooms();
            });

            socket.on('auth_error', (data) => {
                console.error('❌ Auth error:', data);
                document.getElementById('loadingOverlay').style.display = 'none';
                showError('خطأ في المصادقة: ' + data.message);
            });

            socket.on('lobby_joined', (data) => {
                console.log('📋 Lobby joined:', data);
                if (data.rooms) {
                    renderRooms(data.rooms);
                }
            });

            socket.on('rooms_list', (data) => {
                console.log('📋 Rooms list:', data);
                if (data.rooms) {
                    renderRooms(data.rooms);
                }
            });

            socket.on('room_joined', (data) => {
                console.log('✅ Room joined:', data);
                isInRoom = true;
                currentRoomId = data.roomId;
                showStatus('✅ تم الانضمام إلى الغرفة بنجاح!', 'success');
                document.getElementById('userBalance').textContent = data.balance || 0;
                loadSeats(data.roomId);
            });

            socket.on('room_left', (data) => {
                console.log('🚪 Room left:', data);
                isInRoom = false;
                currentRoomId = null;
                showStatus('🚪 تم مغادرة الغرفة', 'info');
                closeSeats();
                loadRooms();
            });

            socket.on('player_joined', (data) => {
                console.log('👤 Player joined:', data);
                if (currentRoomId) {
                    loadSeats(currentRoomId);
                }
            });

            socket.on('player_left', (data) => {
                console.log('🚪 Player left:', data);
                if (currentRoomId) {
                    loadSeats(currentRoomId);
                }
            });

            socket.on('error', (data) => {
                console.error('❌ Socket error:', data);
                showStatus('❌ ' + data.message, 'error');
            });

            socket.on('disconnect', () => {
                console.log('🔌 Socket disconnected');
                showStatus('⚠️ انقطع الاتصال بالخادم، جاري إعادة المحاولة...', 'error');
            });

            socket.on('reconnect', () => {
                console.log('🔄 Socket reconnected');
                showStatus('✅ تم إعادة الاتصال', 'success');
                if (currentUser) {
                    socket.emit('auth', { telegramId: currentUser.telegramId });
                }
            });

            return socket;
        }

        // ============================================
        // 🏠 تحميل الغرف
        // ============================================
        function loadRooms() {
            if (socket) {
                socket.emit('join_lobby');
            }
        }

        // ============================================
        // 🎨 عرض الغرف
        // ============================================
        function renderRooms(rooms) {
            const grid = document.getElementById('roomsGrid');
            
            if (!rooms || rooms.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px;color:#888;">
                        🏠 لا توجد غرف متاحة حالياً<br>
                        <span style="font-size:14px;">سيتم إنشاء غرفة جديدة عند الحاجة</span>
                    </div>
                `;
                return;
            }

            // ترتيب الغرف حسب النوع
            const orderedRooms = [
                rooms.find(r => r.typeName === 'غرفة المبتدئين'),
                rooms.find(r => r.typeName === 'غرفة المتقدمين'),
                rooms.find(r => r.typeName === 'غرفة المحترفين')
            ].filter(Boolean);

            const icons = {
                'غرفة المبتدئين': '🟢',
                'غرفة المتقدمين': '🟡',
                'غرفة المحترفين': '🔴'
            };

            const colors = {
                'غرفة المبتدئين': '#2ecc71',
                'غرفة المتقدمين': '#f1c40f',
                'غرفة المحترفين': '#e74c3c'
            };

            grid.innerHTML = orderedRooms.map(room => {
                const isFull = room.isFull || room.players >= room.maxSeats;
                const statusClass = isFull ? 'full' : (room.status === 'active' ? 'active' : 'waiting');
                const statusText = isFull ? '🟢 مكتملة' : (room.status === 'active' ? '⚔️ جارية' : '🔓 متاحة');
                
                return `
                    <div class="room-card" onclick="${isFull ? '' : `selectRoom('${room.id}')`}" 
                         style="${isFull ? 'opacity:0.6;cursor:not-allowed;' : ''}">
                        <div class="room-icon">${icons[room.typeName] || '🏠'}</div>
                        <div class="room-name" style="color:${colors[room.typeName] || '#fff'}">${room.name}</div>
                        <div class="room-details">
                            👥 <span>${room.players}</span>/${room.maxSeats} لاعب
                            &nbsp;|&nbsp; 💰 <span>${room.seatPrice}</span> $
                        </div>
                        <div class="room-status">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <span class="players-count">
                                ${isFull ? '✅ مكتملة' : `⏳ يحتاج ${room.needed} لاعب`}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // 🪑 اختيار غرفة وعرض المقاعد
        // ============================================
        function selectRoom(roomId) {
            if (isInRoom) {
                showStatus('⚠️ أنت بالفعل في غرفة. اخرج أولاً', 'error');
                return;
            }

            selectedRoomId = roomId;
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // إرسال طلب الانضمام
            socket.emit('join_room', { roomId });
            
            // بدلاً من ذلك، نعرض المقاعد مباشرة ونطلب الانضمام
            // يتم التعامل مع الانضمام في حدث room_joined
        }

        // ============================================
        // 🪑 تحميل المقاعد
        // ============================================
        function loadSeats(roomId) {
            // جلب معلومات الغرفة والمقاعد من الخادم
            fetch(`${SERVER_URL}/api/rooms`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.rooms) {
                        const room = data.rooms.find(r => r.id === roomId);
                        if (room) {
                            displaySeats(room);
                        }
                    }
                })
                .catch(err => {
                    console.error('Error loading seats:', err);
                    showStatus('❌ خطأ في تحميل المقاعد', 'error');
                });
        }

        // ============================================
        // 🪑 عرض المقاعد
        // ============================================
        function displaySeats(room) {
            const section = document.getElementById('seatsSection');
            section.classList.add('visible');
            
            document.getElementById('selectedRoomTitle').textContent = `🪑 ${room.name}`;
            document.getElementById('seatsPlayersCount').textContent = room.players || 0;
            document.getElementById('seatsMaxPlayers').textContent = room.maxSeats || 0;
            document.getElementById('seatsPrice').textContent = room.seatPrice || 0;
            document.getElementById('seatsNeeded').textContent = room.needed || room.maxSeats - (room.players || 0);

            const grid = document.getElementById('seatsGrid');
            const maxSeats = room.maxSeats || 4;
            const players = room.players || 0;
            
            // معرف المستخدم الحالي
            const telegramId = getTelegramId();
            const isAdmin = telegramId === ADMIN_TELEGRAM_ID;

            grid.innerHTML = '';
            for (let i = 0; i < maxSeats; i++) {
                const isOccupied = i < players;
                const isMine = isOccupied && i === 0; // سيتم تحسينه لاحقاً مع بيانات حقيقية
                
                const seat = document.createElement('div');
                seat.className = `seat ${isOccupied ? (isMine ? 'mine' : 'occupied') : 'empty'}`;
                
                if (!isOccupied) {
                    seat.onclick = () => joinSeat(room.id, i);
                }
                
                seat.innerHTML = `
                    <div class="seat-number">${i + 1}</div>
                    <div class="seat-status">${isOccupied ? (isMine ? '👤 أنت' : '🔴 محجوز') : '🟢 فارغ'}</div>
                    ${isOccupied && !isMine ? `<div class="player-name">لاعب ${i + 1}</div>` : ''}
                `;
                
                grid.appendChild(seat);
            }
            
            // إظهار زر مغادرة الغرفة إذا كان المستخدم في الغرفة
            document.getElementById('leaveRoomBtn').style.display = isInRoom ? 'inline-block' : 'none';
            
            // تمرير إلى المقاعد
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ============================================
        // 💺 الانضمام إلى مقعد
        // ============================================
        function joinSeat(roomId, seatIndex) {
            if (isInRoom) {
                showStatus('⚠️ أنت بالفعل في هذه الغرفة', 'error');
                return;
            }
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            socket.emit('join_room', { roomId });
        }

        // ============================================
        // 🚪 مغادرة الغرفة
        // ============================================
        function leaveRoom() {
            if (!isInRoom) {
                showStatus('⚠️ أنت لست في أي غرفة', 'error');
                return;
            }
            
            if (confirm('⚠️ هل أنت متأكد من مغادرة الغرفة؟ سيتم إعادة رصيدك.')) {
                document.getElementById('loadingOverlay').style.display = 'flex';
                socket.emit('leave_room');
            }
        }

        // ============================================
        // 🔄 تحديث المقاعد
        // ============================================
        function refreshSeats() {
            if (currentRoomId) {
                loadSeats(currentRoomId);
                showStatus('🔄 تم تحديث المقاعد', 'info');
            } else {
                loadRooms();
            }
        }

        // ============================================
        // ❌ إغلاق المقاعد
        // ============================================
        function closeSeats() {
            document.getElementById('seatsSection').classList.remove('visible');
            selectedRoomId = null;
            if (!isInRoom) {
                currentRoomId = null;
            }
        }

        // ============================================
        // 📊 عرض رسالة الحالة
        // ============================================
        function showStatus(message, type = 'info') {
            const el = document.getElementById('statusMessage');
            el.textContent = message;
            el.className = `status-message ${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    el.className = 'status-message';
                }, 5000);
            }
        }

        // ============================================
        // 🚫 عرض خطأ
        // ============================================
        function showError(message) {
            document.getElementById('errorScreen').style.display = 'flex';
            document.getElementById('errorScreen').querySelector('p').textContent = message;
            document.getElementById('mainContainer').style.display = 'none';
        }

        // ============================================
        // 🚀 تهيئة الصفحة
        // ============================================
        async function init() {
            const telegramId = getTelegramId();
            
            if (!telegramId) {
                showError('لم يتم العثور على معرف المستخدم. يرجى تسجيل الدخول عبر تيليغرام.');
                return;
            }

            // التحقق من صلاحيات المشرف (للإظهار فقط)
            const isAdmin = telegramId === ADMIN_TELEGRAM_ID;
            if (isAdmin) {
                console.log('👑 Admin user detected');
            }

            document.getElementById('mainContainer').style.display = 'block';
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // الاتصال بالخادم
            connectSocket(telegramId);
            
            // تحميل الغرف
            setTimeout(() => {
                if (socket) {
                    socket.emit('join_lobby');
                }
            }, 500);
        }

        // ============================================
        // 🚀 بدء التشغيل
        // ============================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
