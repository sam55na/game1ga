<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Tanks Elite - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           🎨 الأنماط المتقدمة مع تأثيرات احترافية
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --gold: #d4af37;
            --gold-dark: #b8860b;
            --gold-light: #f0d060;
            --dark: #0a0f1a;
            --darker: #05070c;
            --text: #e8e8e8;
            --text-muted: #8a9aa8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(120px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #1a2a3a 0%, var(--dark) 50%, var(--darker) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ============================================================
           🌟 خلفية متحركة مع جسيمات
           ============================================================ */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particles span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.15;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 4s ease-in-out infinite;
        }

        /* ============================================================
           📦 حاوية تسجيل الدخول
           ============================================================ */
        .container {
            background: rgba(10, 15, 30, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px 40px;
            border-radius: 48px;
            text-align: center;
            max-width: 440px;
            width: 92%;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.8),
                0 0 60px rgba(212, 175, 55, 0.05),
                inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* ============================================================
           🏷️ الشعار والعنوان
           ============================================================ */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .logo {
            font-size: 72px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.2));
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: orbit 12s linear infinite;
        }

        .logo-ring::before {
            content: '✦';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            font-size: 12px;
        }

        h1 {
            color: var(--gold);
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            margin-top: 5px;
        }

        h1 .elite {
            font-size: 14px;
            letter-spacing: 4px;
            display: block;
            color: var(--gold-light);
            opacity: 0.7;
            font-weight: 400;
            margin-top: -2px;
        }

        .subtitle {
            color: var(--text-muted);
            margin: 8px 0 30px;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .subtitle span {
            color: var(--gold);
        }

        /* ============================================================
           🔘 زر تيليغرام
           ============================================================ */
        .telegram-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            padding: 18px 40px;
            border-radius: 60px;
            border: none;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 25px rgba(0, 136, 204, 0.3);
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .telegram-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,255,255,0.05) 50%,
                transparent 70%
            );
            animation: shimmer 3s infinite;
            background-size: 200% 100%;
        }

        .telegram-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 45px rgba(0, 136, 204, 0.5);
        }

        .telegram-btn:active {
            transform: scale(0.97);
        }

        .telegram-btn .icon {
            font-size: 28px;
            position: relative;
            z-index: 1;
        }

        .telegram-btn .text {
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           ➖ الفاصل
           ============================================================ */
        .or-divider {
            margin: 25px 0;
            color: #444;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 2px;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        /* ============================================================
           📝 نموذج تسجيل الدخول
           ============================================================ */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .login-form .input-group {
            position: relative;
        }

        .login-form .input-group .icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.5;
            pointer-events: none;
        }

        .login-form input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .login-form input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.08);
            background: rgba(255, 255, 255, 0.08);
        }

        .login-form input::placeholder {
            color: #555;
        }

        .login-form button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 25px rgba(212, 175, 55, 0.2);
            font-family: 'Cairo', sans-serif;
            color: var(--dark);
            margin-top: 5px;
        }

        .login-form button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 40px rgba(212, 175, 55, 0.4);
        }

        .login-form button:active {
            transform: scale(0.97);
        }

        /* ============================================================
           📊 حالات ورسائل
           ============================================================ */
        .loading-spinner {
            display: none;
            margin: 15px auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.15);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-message.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .status-message.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .status-message.info {
            display: block;
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid rgba(52, 152, 219, 0.3);
            color: #3498db;
        }

        /* ============================================================
           🔒 التذييل
           ============================================================ */
        .footer {
            margin-top: 25px;
            color: #444;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .footer .lock {
            font-size: 14px;
        }

        .footer .version {
            color: #333;
            font-size: 10px;
            margin-left: 10px;
        }

        /* ============================================================
           📱 التجاوب مع الشاشات الصغيرة
           ============================================================ */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 32px;
            }

            h1 {
                font-size: 26px;
            }

            .logo {
                font-size: 56px;
            }

            .telegram-btn {
                font-size: 17px;
                padding: 15px 20px;
            }

            .login-form input {
                padding: 14px 16px 14px 44px;
                font-size: 15px;
            }

            .login-form button {
                font-size: 16px;
                padding: 14px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 20px 15px;
                border-radius: 24px;
            }

            h1 {
                font-size: 22px;
            }

            .logo {
                font-size: 44px;
            }

            .telegram-btn {
                font-size: 15px;
                padding: 12px 16px;
            }
        }

        /* ============================================================
           🌙 دعم الوضع المظلم (افتراضي)
           ============================================================ */
        @media (prefers-color-scheme: light) {
            body {
                background: radial-gradient(ellipse at 30% 20%, #e8e8e8, #c0c0c0);
            }
            .container {
                background: rgba(255, 255, 255, 0.95);
                border-color: rgba(212, 175, 55, 0.4);
            }
            h1 { color: var(--gold-dark); }
            .login-form input {
                background: rgba(0, 0, 0, 0.05);
                color: #222;
            }
            .login-form input::placeholder { color: #999; }
            .subtitle { color: #666; }
            .footer { color: #999; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    🌟 خلفية متحركة
    ============================================================ -->
    <div class="bg-particles" id="particles"></div>
    <div class="bg-glow"></div>

    <!-- ============================================================
    📦 حاوية تسجيل الدخول
    ============================================================ -->
    <div class="container">
        <div class="logo-wrapper">
            <div class="logo">⚔️</div>
            <div class="logo-ring"></div>
        </div>

        <h1>
            BATTLE TANKS
            <span class="elite">✦ ELITE ✦</span>
        </h1>

        <p class="subtitle">
            ساحة المعركة الإلكترونية <span>النهائية</span>
        </p>

        <!-- ============================================================
        🔘 زر تيليغرام
        ============================================================ -->
        <button class="telegram-btn" id="telegramLoginBtn">
            <span class="icon">🚀</span>
            <span class="text">تسجيل الدخول عبر تيليغرام</span>
        </button>

        <div class="or-divider">أو</div>

        <!-- ============================================================
        📝 نموذج تسجيل الدخول
        ============================================================ -->
        <form class="login-form" id="loginForm" autocomplete="off">
            <div class="input-group">
                <span class="icon">👤</span>
                <input
                    type="text"
                    id="username"
                    placeholder="اسم المستخدم"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="input-group">
                <span class="icon">🔒</span>
                <input
                    type="password"
                    id="password"
                    placeholder="كلمة المرور"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit">🎖️ دخول إلى المعركة</button>
        </form>

        <!-- ============================================================
        📊 حالات ورسائل
        ============================================================ -->
        <div class="loading-spinner" id="loadingSpinner"></div>
        <div class="status-message" id="statusMessage"></div>

        <!-- ============================================================
        🔒 التذييل
        ============================================================ -->
        <div class="footer">
            <span class="lock">🔒</span>
            يتم تسجيل الدخول بشكل آمن عبر تيليغرام
            <span class="version">v6.0</span>
        </div>
    </div>

    <!-- ============================================================
    📜 JavaScript
    ============================================================ -->
    <script>
        // ============================================================
        // 🌟 إنشاء جسيمات الخلفية
        // ============================================================
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const span = document.createElement('span');
                const size = 2 + Math.random() * 4;
                const duration = 15 + Math.random() * 25;
                const delay = Math.random() * 20;
                const x = Math.random() * 100;
                span.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}%;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                container.appendChild(span);
            }
        })();

        // ============================================================
        // 🔐 استخلاص معرف تيليغرام من الرابط
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');

        if (userId) {
            localStorage.setItem('telegramId', userId);
            localStorage.setItem('telegramUsername', 'user_' + userId);
            // ✅ التصحيح: استخدام game.html بدلاً من /game
            window.location.href = 'game.html?user_id=' + userId;
        }

        // ============================================================
        // 📱 تسجيل الدخول عبر تيليغرام
        // ============================================================
        document.getElementById('telegramLoginBtn').addEventListener('click', function() {
            const statusMsg = document.getElementById('statusMessage');
            const spinner = document.getElementById('loadingSpinner');

            statusMsg.className = 'status-message';
            statusMsg.style.display = 'none';
            spinner.style.display = 'block';

            // فتح بوت تيليغرام
            const botUsername = '@YourBattleTanksBot';
            window.open(`https://t.me/${botUsername}?start=login`, '_blank');

            // محاكاة استقبال معرف المستخدم (في الإنتاج، سيأتي من البوت)
            setTimeout(() => {
                const fakeId = Math.floor(Math.random() * 9000000) + 1000000;
                localStorage.setItem('telegramId', fakeId);
                localStorage.setItem('telegramUsername', 'user_' + fakeId);
                spinner.style.display = 'none';
                statusMsg.className = 'status-message success';
                statusMsg.style.display = 'block';
                statusMsg.textContent = '✅ تم تسجيل الدخول بنجاح! جاري التوجيه...';
                setTimeout(() => {
                    // ✅ التصحيح: استخدام game.html بدلاً من /game
                    window.location.href = 'game.html?user_id=' + fakeId;
                }, 1000);
            }, 2000);
        });

        // ============================================================
        // 🔐 تسجيل الدخول بكلمة مرور
        // ============================================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const statusMsg = document.getElementById('statusMessage');
            const spinner = document.getElementById('loadingSpinner');

            statusMsg.className = 'status-message';
            statusMsg.style.display = 'none';
            spinner.style.display = 'block';

            if (!username || !password) {
                spinner.style.display = 'none';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                statusMsg.textContent = '⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور';
                return;
            }

            try {
                // محاكاة مصادقة (في الإنتاج، سيتم الاتصال بالخادم)
                const fakeId = Math.floor(Math.random() * 9000000) + 1000000;
                localStorage.setItem('telegramId', fakeId);
                localStorage.setItem('telegramUsername', username);

                spinner.style.display = 'none';
                statusMsg.className = 'status-message success';
                statusMsg.style.display = 'block';
                statusMsg.textContent = '✅ تم تسجيل الدخول بنجاح! جاري التوجيه...';

                setTimeout(() => {
                    // ✅ التصحيح: استخدام game.html بدلاً من /game
                    window.location.href = 'game.html?user_id=' + fakeId;
                }, 1000);

            } catch (error) {
                spinner.style.display = 'none';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                statusMsg.textContent = '❌ ' + error.message;
            }
        });

        // ============================================================
        // 🔄 التحقق من وجود جلسة سابقة
        // ============================================================
        if (localStorage.getItem('telegramId')) {
            // ✅ التصحيح: استخدام game.html بدلاً من /game
            window.location.href = 'game.html?user_id=' + localStorage.getItem('telegramId');
        }
    </script>

</body>
</html>
