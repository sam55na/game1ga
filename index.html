<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Battle Tanks - معركة الدبابات</title>
    <style>
        /* ============================================
           🎨 الأنماط العامة والخلفية المتحركة
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #0a0f1a;
            overflow: hidden;
            position: relative;
        }

        /* 🌌 الخلفية المتحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1a2e 30%, #16213e 60%, #0a0f1a 100%);
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 40%);
            animation: bgMove 30s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5%, -5%) rotate(1deg); }
            66% { transform: translate(-5%, 5%) rotate(-1deg); }
        }

        /* ✨ النجوم */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ============================================
           🚫 شاشة الخطأ (عند عدم وجود معرف)
           ============================================ */
        .error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            backdrop-filter: blur(10px);
        }

        .error-screen .icon {
            font-size: 80px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .error-screen h1 {
            color: #ff4444;
            font-size: 32px;
            text-align: center;
        }

        .error-screen p {
            color: #aaa;
            font-size: 18px;
            text-align: center;
            max-width: 400px;
            line-height: 1.8;
        }

        .error-screen .btn-telegram {
            padding: 16px 40px;
            background: #0088cc;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .error-screen .btn-telegram:hover {
            transform: scale(1.05);
        }

        /* ============================================
           📊 الشريط العلوي (Header)
           ============================================ */
        .header {
            position: relative;
            z-index: 1;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .logo span {
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 8px 20px 8px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #000;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .user-id {
            color: #888;
            font-size: 11px;
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(184, 134, 11, 0.1));
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-card .label {
            color: #aaa;
            font-size: 13px;
        }

        .balance-card .value {
            color: #d4af37;
            font-size: 20px;
            font-weight: bold;
        }

        .balance-card .currency {
            color: #d4af37;
            font-size: 14px;
        }

        .admin-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
            display: none;
        }

        .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(231, 76, 60, 0.4);
        }

        .admin-btn.visible {
            display: inline-block;
        }

        /* ============================================
           🎮 المحتوى الرئيسي
           ============================================ */
        .main-content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px 0;
        }

        /* 🖼️ صورة اللعبة */
        .game-image-container {
            width: 100%;
            max-width: 800px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(212, 175, 55, 0.3);
            position: relative;
        }

        .game-image-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s;
        }

        .game-image-container:hover img {
            transform: scale(1.02);
        }

        .game-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 30px;
        }

        .game-image-overlay .title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        /* 🔘 زر العب الآن */
        .play-btn {
            padding: 18px 60px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 40px rgba(212, 175, 55, 0.5);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        /* ============================================
           📱 استجابة للجوال
           ============================================ */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .header-left {
                justify-content: center;
            }

            .header-right {
                justify-content: center;
            }

            .logo {
                font-size: 18px;
            }

            .user-card {
                padding: 5px 12px 5px 5px;
            }

            .user-avatar {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .balance-card .value {
                font-size: 16px;
            }

            .play-btn {
                padding: 14px 40px;
                font-size: 20px;
            }

            .error-screen h1 {
                font-size: 24px;
            }

            .error-screen p {
                font-size: 16px;
                padding: 0 20px;
            }
        }

        @media (max-width: 480px) {
            .header-right {
                flex-wrap: wrap;
            }

            .user-info .user-name {
                font-size: 12px;
            }

            .balance-card {
                padding: 5px 12px;
            }

            .balance-card .value {
                font-size: 14px;
            }

            .play-btn {
                padding: 12px 30px;
                font-size: 18px;
            }
        }

        /* ============================================
           🔄 تحميل
           ============================================ */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .loading-overlay .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- ============================================
    🌌 الخلفية المتحركة
    ============================================ -->
    <div class="bg-animation"></div>
    <div class="stars" id="stars"></div>

    <!-- ============================================
    🚫 شاشة الخطأ (عند عدم وجود معرف)
    ============================================ -->
    <div class="error-screen" id="errorScreen" style="display:none;">
        <div class="icon">🔒</div>
        <h1>⚠️ خطأ في المصادقة</h1>
        <p>
            يرجى تسجيل الدخول عبر بوت تيليغرام للحصول على معرف المستخدم.<br>
            اضغط على الزر أدناه لفتح البوت.
        </p>
        <a href="https://t.me/BattleTanksBot" target="_blank" class="btn-telegram">
            📱 فتح بوت تيليغرام
        </a>
        <p style="font-size:14px;color:#666;margin-top:10px;">
            تأكد من أن الرابط يحتوي على <code style="background:#222;padding:2px 8px;border-radius:4px;">?user_id=123456789</code>
        </p>
    </div>

    <!-- ============================================
    🔄 شاشة التحميل
    ============================================ -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- ============================================
    📱 المحتوى الرئيسي
    ============================================ -->
    <div class="container" id="mainContainer" style="display:none;">
        <!-- 📊 الشريط العلوي -->
        <header class="header">
            <div class="header-left">
                <div class="logo">⚔️ Battle <span>Tanks</span></div>
            </div>
            <div class="header-right">
                <div class="user-card">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-info">
                        <span class="user-name" id="userName">اللاعب</span>
                        <span class="user-id" id="userId">ID: 0000000</span>
                    </div>
                </div>
                <div class="balance-card">
                    <span class="label">💰 الرصيد</span>
                    <span class="value" id="userBalance">0</span>
                    <span class="currency">$</span>
                </div>
                <button class="admin-btn" id="adminBtn" onclick="window.location.href='admin.html'">
                    ⚙️ لوحة التحكم
                </button>
            </div>
        </header>

        <!-- 🎮 المحتوى -->
        <div class="main-content">
            <!-- صورة اللعبة -->
            <div class="game-image-container">
                <img src="https://via.placeholder.com/800x400/1a1a2e/d4af37?text=Battle+Tanks+⚔️" alt="Battle Tanks" id="gameImage">
                <div class="game-image-overlay">
                    <span class="title">⚔️ ساحة المعركة ⚔️</span>
                </div>
            </div>

            <!-- زر العب الآن -->
            <button class="play-btn" id="playBtn">🎮 العب الآن</button>
        </div>
    </div>

    <!-- ============================================
    📜 JavaScript
    ============================================ -->
    <script>
        // ============================================
        // 🎯 إعدادات
        // ============================================
        const ADMIN_TELEGRAM_ID = '7011476249';
        const SERVER_URL = window.location.origin;
        const BOT_URL = 'https://t.me/BattleTanksBot';

        // ============================================
        // ⭐ إنشاء النجوم
        // ============================================
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = (Math.random() * 5) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // ============================================
        // 📱 استخلاص معرف المستخدم من الرابط
        // ============================================
        function getTelegramId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('user_id') || params.get('telegram_id') || null;
        }

        // ============================================
        // 🔐 التحقق من المصادقة
        // ============================================
        function checkAuth() {
            const telegramId = getTelegramId();
            
            if (!telegramId) {
                // إظهار شاشة الخطأ
                document.getElementById('errorScreen').style.display = 'flex';
                document.getElementById('mainContainer').style.display = 'none';
                return false;
            }

            // التحقق من صلاحيات المشرف
            const isAdmin = (telegramId === ADMIN_TELEGRAM_ID);
            
            // إظهار المحتوى الرئيسي
            document.getElementById('errorScreen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
            
            // إظهار زر المشرف إذا كان المستخدم مشرفاً
            if (isAdmin) {
                document.getElementById('adminBtn').classList.add('visible');
            }
            
            // تحديث معلومات المستخدم
            document.getElementById('userId').textContent = `ID: ${telegramId}`;
            document.getElementById('userName').textContent = `مستخدم ${telegramId.slice(-4)}`;
            document.getElementById('userAvatar').textContent = telegramId.slice(-2);
            
            return true;
        }

        // ============================================
        // 💰 جلب الرصيد من الخادم
        // ============================================
        async function fetchBalance(telegramId) {
            try {
                const response = await fetch(`${SERVER_URL}/api/user/${telegramId}`);
                const data = await response.json();
                
                if (data.success && data.user) {
                    document.getElementById('userBalance').textContent = data.user.balance || 0;
                    document.getElementById('userName').textContent = data.user.username || `مستخدم ${telegramId.slice(-4)}`;
                }
            } catch (error) {
                console.error('Error fetching balance:', error);
                // استخدام الرصيد الافتراضي
                document.getElementById('userBalance').textContent = '100';
            }
        }

        // ============================================
        // 🚀 تهيئة الصفحة
        // ============================================
        async function init() {
            const telegramId = getTelegramId();
            
            if (!telegramId) {
                document.getElementById('errorScreen').style.display = 'flex';
                document.getElementById('mainContainer').style.display = 'none';
                return;
            }

            // إظهار التحميل
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // التحقق من المصادقة
            checkAuth();
            
            // جلب الرصيد
            await fetchBalance(telegramId);
            
            // إخفاء التحميل
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ============================================
        // 🎮 زر العب الآن - يفتح game.html
        // ============================================
        document.getElementById('playBtn').addEventListener('click', () => {
            const telegramId = getTelegramId();
            if (telegramId) {
                window.location.href = `game.html?user_id=${telegramId}`;
            } else {
                window.location.href = `game.html`;
            }
        });

        // ============================================
        // 🚀 بدء التشغيل
        // ============================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
